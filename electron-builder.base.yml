appId: run.rosie.zephus
productName: Zephus
asar: true
files:
  - 'dist/**/*'
  - 'src/renderer/**/*'
  - 'licenses.json'
  - '!**/node_modules/*/{test,__tests__,tests}/**'
  - '!**/*.md'
  - '!src/renderer/**/*.ts'
  - '!src/renderer/**/*.map'
directories:
  output: release
publish:
  provider: github
  owner: BurntToasters
  repo: zephus
win:
  target: nsis
  icon: build/app-icon.ico
nsis:
  artifactName: Zephus-Windows-${arch}.${ext}
  allowToChangeInstallationDirectory: false
  oneClick: false
  perMachine: false
mac:
  target:
    - dmg
    - zip
  icon: build/app-icon.icns
  artifactName: Zephus-MacOS-universal.${ext}
linux:
  target:
    - AppImage
    - deb
    - rpm
  icon: build/app-icon.png
  category: Development
  syncDesktopName: true
appImage:
  artifactName: Zephus-Linux-${arch}.${ext}
deb:
  artifactName: Zephus-Linux-${arch}.${ext}
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0
rpm:
  artifactName: Zephus-Linux-${arch}.${ext}
  depends:
    - gtk3
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - at-spi2-core
    - libuuid
    - libsecret
dmg:
  background: build/dmg-background.png
  icon: build/app-icon.png
  iconSize: 100
  contents:
    - x: 120
      'y': 300
      type: file
    - x: 546
      'y': 300
      type: link
      path: /Applications
  window:
    width: 648
    height: 480
