<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline';"
    />
    <title>Zephus</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #1e1e2e;
        color: #cdd6f4;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .logo {
        font-size: 42px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #89b4fa;
      }
      .tag {
        font-size: 13px;
        opacity: 0.7;
      }
      .version {
        position: absolute;
        bottom: 14px;
        font-size: 11px;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">Zephus</div>
      <div class="tag">Local WYSIWYG editor for Astro</div>
      <div class="version" id="version-display">v0.1.0-db.7</div>
    </div>
  </body>
</html>
